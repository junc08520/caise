<script>
function goWhatsApp() {
  // 触发 TikTok 线索事件

  // 延迟跳转，确保事件发送成功
  setTimeout(function(){
    window.location.href = "https://api.whatsapp.com/send/?phone=13049719309&text=hello";
  }, 300);
}
